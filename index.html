<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>闇の破片の時間</title>
    <meta name="description" content="闇の破片が落ちる時間と場所をリアルタイムで確認">

    <link rel="stylesheet" href="./sanitize.css">
    <link rel="stylesheet" href="./style_02.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">

    <link rel="icon" href="favicon.png" type="image/x-icon">
</head>
<body>
    <div class="header_wrap">
        <header>
            <div class="header_container">
                <h1>闇の破片の時間</h1>
                <button class="menu_button">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        <div id="clock"></div>
        </header>
    </div>

    <div class="event_container">
        <h2 id="no_event"></h2>
        <p class="event_1"></p>
        <p class="event_2"></p>
        <p class="event_3"></p>
        <h2 id="countdown">開始まで 02:40:34</h2>
    </div>

    <h2 id="today_location"></h2>

    <div class="loading_container">
        <div class="load_bg">
            <img src="shard_icon.svg" class="loading_icon">
            <h2 class="load_text">Now loading...</h2>
        </div>
    </div>

    <script src="./ARapp.js"></script>
</body>
</html>
